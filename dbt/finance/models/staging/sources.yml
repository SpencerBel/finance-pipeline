version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: stock_prices
        description: "Raw daily OHLCV market data loaded by the ingestion layer"
        columns:
          - name: ticker
            description: "Stock ticker symbol"
          - name: date
            description: "Trading day"
          - name: open
            description: "Opening price"
          - name: high
            description: "Daily high price"
          - name: low
            description: "Daily low price"
          - name: close
            description: "Closing price"
          - name: volume
            description: "Number of shares traded"